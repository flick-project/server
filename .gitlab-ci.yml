.before_script_ssh_setup: &before_script_ssh_setup
  # Ensure ssh-agent is installed and started, essential for managing SSH keys.
  - command -v ssh-agent >/dev/null || ( apk add --no-cache openssh-client )

  # Start the ssh-agent in the background.
  - eval $(ssh-agent -s)

  # Add the SSH private key stored in the SSH_PRIVATE_KEY variable to the ssh-agent.
  # Using 'tr' to remove carriage return characters for compatibility with ed25519 keys.
  # Reference: https://gitlab.com/gitlab-examples/ssh-private-key/issues/1#note_48526556
  - echo "$SSH_PRIVATE_KEY" | base64 -d | tr -d '\r' | ssh-add -

  # Create the .ssh directory and set the correct permissions.
  - mkdir -p ~/.ssh
  - chmod 700 ~/.ssh

  # Use ssh-keyscan to add the remote server's SSH key to the known_hosts file.
  # This prevents SSH from prompting for approval of the remote server's key.
  - ssh-keyscan -H $PRODUCTION_HOST >> ~/.ssh/known_hosts
  - chmod 644 ~/.ssh/known_hosts

include:
- template: Security/SAST.gitlab-ci.yml
- template: Security/Secret-Detection.gitlab-ci.yml

variables:
  SECRET_DETECTION_ENABLED: 'true'

default:
  artifacts:
    expire_in: 1 day

# Define the stages of the pipeline and their order of execution.
stages:
  - test
  - deploy

test:
  stage: test
  image: node:24-alpine
  services:
    - postgres:17-alpine
  variables:
    POSTGRES_USER: flick
    POSTGRES_PASSWORD: test
    POSTGRES_DB: flick_test
    DATABASE_URL: postgresql://flick:test@postgres:5432/flick_test
    PORT: 3000
    JWT_SECRET: test-secret
    JWT_LIFE: 15m
    TMDB_API_KEY: fake-key
  script:
    - echo "Running tests and linting..."
    - apk add --no-cache postgresql-client
    - npm ci
    - PGPASSWORD=test psql -h postgres -U flick -d flick_test -f sql/schema.sql
    - node --experimental-test-module-mocks --test --test-concurrency=1 tests/**/*.test.js
    - npm run lint
  # Cache node modules and update if package-lock hash changes.
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
  rules:
    - if: $CI_COMMIT_BRANCH
    - if: $CI_COMMIT_TAG

deploy:
  stage: deploy
  image: docker:27-cli
  before_script: *before_script_ssh_setup
  script:
    - unset DOCKER_HOST
    - docker context create production --docker "host=ssh://hasse@$PRODUCTION_HOST"
    - docker context use production
    - echo "DATABASE_URL=${DATABASE_URL}" > .env
    - echo "JWT_SECRET=${JWT_SECRET}" >> .env
    - echo "JWT_LIFE=${JWT_LIFE}" >> .env
    - echo "TMDB_API_KEY=${TMDB_API_KEY}" >> .env
    - echo "PORT=${PORT}" >> .env
    - docker compose -f docker-compose.production.yml up -d --build
    - docker system prune -f
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  needs:
    - test