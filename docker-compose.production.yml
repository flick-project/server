services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: flick-server
    restart: unless-stopped
    command: sh -c "until npm run migrate:up; do sleep 2; done && node src/server.js"
    env_file: .env
    environment:
      - PORT=3000
      - JWT_LIFE=10m
      - CORS_ORIGIN=https://flick.lingon.cloud
    networks:
      - flick-network
      - proxy

networks:
  flick-network:
    name: flick-network
    external: true
  proxy:
    name: proxy
    external: true
